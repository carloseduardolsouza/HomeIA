[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "15s"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  fielddrop = ["time_*"]

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs"]

[[inputs.diskio]]

[[inputs.net]]

[[inputs.system]]

[[inputs.processes]]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  container_names = []

[[inputs.tail]]
  files = ["/var/log/syslog", "/var/log/auth.log"]
  from_beginning = false
  data_format = "grok"
  grok_patterns = ["%{TIMESTAMP_ISO8601:timestamp:ts-\"2006-01-02T15:04:05Z07:00\"} %{GREEDYDATA:message}"]

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
